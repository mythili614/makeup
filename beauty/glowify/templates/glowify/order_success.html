{% extends 'glowify/base.html' %}

{% block content %}

<div style="padding:40px; text-align:center;">

    <h2>🎉 Thank You for Your Purchase!</h2>

    {% if order %}
        <h3>Order ID : {{ order.id }}</h3>
        <p>Status : {{ order.status }}</p>

        <br>

        <!-- ✅ FIXED TRACK ORDER -->
        <a href="{% url 'track_order' order.id %}" style="
            background:#ff3f6c;
            color:white;
            padding:10px 20px;
            border-radius:5px;
            text-decoration:none;">
            Track Order
        </a>

    {% else %}
        <p>No order found</p>
    {% endif %}

    <br><br>

    <a href="/" style="text-decoration:none;">← Back to Home</a>

</div>

{% endblock %}
